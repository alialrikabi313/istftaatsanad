name: Functions CI

on:
  push:
    branches: [ main ]
    paths: [ 'functions/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'functions/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - run: npm ci || npm install
      - run: npm run build
