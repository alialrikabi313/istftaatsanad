name: fatawa_sanad
description: "فتاوى الشيخ السند – استفتاءات مرتبة (فقه/عقائد/...) مع Riverpod وClean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.4.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.2.1
  firebase_messaging: ^15.1.2
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # Shared design system
  sanad_ui:
    path: ../sanad_ui

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utils
  collection: ^1.18.0
  intl: ^0.20.2
  equatable: ^2.0.5
  fpdart: ^1.1.0
  flutter_localization: ^0.1.0
  shared_preferences: ^2.2.2
  share_plus: ^7.2.1
  flutter_widget_from_html: ^0.15.0

  # UI helpers
  flutter_svg: ^2.0.10+1

  # For time formatting
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons:

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: '#ffffff'
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/books/
    - assets/
    - assets/books/book_1/
    - assets/books/book_2/
    - assets/books/book_3/
    - assets/books/book_4/
    - assets/books/book_5/
    - assets/books/book_6/
    - assets/books/book_7/
    - assets/books/book_8/
    - assets/books/book_9/
    - assets/books/book_10/
    - assets/books/book_11/
